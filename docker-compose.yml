services:
  api:
    image: yehonatancohen/whatsapp-crm-backend:latest
    container_name: parties247-api
    restart: unless-stopped
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/parties247
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173,https://api.parties247.co.il,https://api.parties247.co.il/,https://whatsapp-crm-frontend-plum.vercel.app}
      - NODE_ENV=production
    volumes:
      - wwebjs_auth:/app/.wwebjs_auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: yehonatancohen/whatsapp-crm-backend:latest
    container_name: parties247-worker
    restart: unless-stopped
    command: [ "node", "dist/worker.js" ]
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/parties247
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    volumes:
      - wwebjs_auth:/app/.wwebjs_auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: parties247-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: parties247
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: parties247-redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: yehonatancohen/whatsapp-crm-nginx:latest
    container_name: parties247-nginx
    restart: unless-stopped
    depends_on:
      - api

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: parties247-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx

  watchtower:
    image: containrrr/watchtower
    container_name: parties247-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 parties247-api parties247-worker parties247-nginx

volumes:
  wwebjs_auth:
  pgdata:
  redisdata:
